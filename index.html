<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lead Capture Dashboard</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
display:flex;
}

.sidebar{
width:250px;
background:#111827;
height:100vh;
padding:20px;
color:white;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:12px;
margin-bottom:10px;
background:#1f2937;
color:white;
text-decoration:none;
border-radius:8px;
}

.content{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Lead Capture</h2>

<a href="#">📊 Dashboard</a>
<a href="#">📦 Produk</a>
<a href="#">👥 CS</a>
<a href="/embed.html">📝 Form Generator</a>
<a href="#">📋 Leads</a>
<a href="#">📈 Analytics</a>
<a href="#">⚙ Settings</a>
</div>

<div class="content">

<div class="card">
<div class="card">

<h2>Produk</h2>

<input
type="text"
id="productName"
placeholder="Nama produk"
style="width:100%;padding:10px;margin:10px 0;"
>

<button onclick="saveProduct()">
Simpan Produk
</button>

<div id="productList"></div>

</div>

<script>

let products = JSON.parse(
localStorage.getItem("products") || "[]"
);

renderProducts();

function saveProduct(){

const name =
document.getElementById(
"productName"
).value;

if(!name) return;

products.push({
id:Date.now(),
name
});

localStorage.setItem(
"products",
JSON.stringify(products)
);

document.getElementById(
"productName"
).value="";

renderProducts();

}

function renderProducts(){

document.getElementById(
"productList"
).innerHTML=

products.map(p=>`

<div style="
padding:10px;
border:1px solid #ddd;
margin-top:10px;
border-radius:8px;
">

${p.name}

</div>

`).join("");

}

</script>

</div>

</body>
</html>
